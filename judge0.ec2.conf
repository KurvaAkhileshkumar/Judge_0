# PostgreSQL
POSTGRES_DB=judge0
POSTGRES_USER=judge0
# Real password injected via docker-compose.ec2.yml environment: override from .env
POSTGRES_PASSWORD=CHANGE_ME
POSTGRES_HOST=db
POSTGRES_PORT=5432

# Redis
# Real password injected via docker-compose.ec2.yml environment: override from .env
REDIS_PASSWORD=CHANGE_ME
REDIS_HOST=redis
REDIS_PORT=6379

# Judge0 / Rails
RAILS_ENV=production
RACK_ENV=production
# Real key injected via docker-compose.ec2.yml environment: override from .env
SECRET_KEY_BASE=CHANGE_ME
JUDGE0_TELEMETRY_ENABLE=false

# ── Submission defaults ────────────────────────────────────────────────────
# CPU wall-clock and memory limits applied when a client does not specify them.
# On native Linux these are enforced by isolate cgroups (no Rosetta 2 overhead).
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MEMORY_LIMIT=256000

# ── Queue ──────────────────────────────────────────────────────────────────
# 200 slots: at ~2 KB/job = ~400 KB Redis memory.
# Keeps backpressure tight on c5.xlarge so Redis never balloons.
MAX_QUEUE_SIZE=200

# ── Worker sandbox settings ────────────────────────────────────────────────
# MAX_RUNNERS: concurrent isolate sandboxes per worker container.
# 3 containers × 2 runners = 6 total sandboxes on a 4-vCPU instance.
MAX_RUNNERS=2

# Harness forks 1 child per test case; needs at least TCs + overhead.
MAX_PROCESSES_PER_WORKER=1100

# Match the container's nofile ulimit set in docker-compose.ec2.yml.
OPEN_FILES_LIMIT=65536

# 512 KB: large enough for a 1000-TC harness with inline test data.
SOURCE_CODE_SIZE_LIMIT=524288

# Max memory_limit a client may request (KB).
# 256 MB is appropriate for c5.xlarge — no Rosetta 2 JIT inflation needed.
MAX_MEMORY_LIMIT=262144
