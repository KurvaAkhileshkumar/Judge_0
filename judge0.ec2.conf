# PostgreSQL
# POSTGRES_PASSWORD omitted — Judge0 dotenv overwrites container env vars,
# so passwords must come from docker-compose.ec2.yml environment: only.
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_HOST=db
POSTGRES_PORT=5432

# Redis
# REDIS_PASSWORD omitted — same reason as above.
REDIS_HOST=redis
REDIS_PORT=6379

# Judge0 / Rails
RAILS_ENV=production
RACK_ENV=production
# SECRET_KEY_BASE omitted — injected via docker-compose.ec2.yml environment:.
JUDGE0_TELEMETRY_ENABLE=false

# ── Submission defaults ────────────────────────────────────────────────────
# CPU wall-clock and memory limits applied when a client does not specify them.
# On native Linux these are enforced by isolate cgroups (no Rosetta 2 overhead).
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MEMORY_LIMIT=256000

# ── Queue ──────────────────────────────────────────────────────────────────
# 200 slots: at ~2 KB/job = ~400 KB Redis memory.
# Keeps backpressure tight on c5.xlarge so Redis never balloons.
MAX_QUEUE_SIZE=200

# ── Worker sandbox settings ────────────────────────────────────────────────
# MAX_RUNNERS: concurrent isolate sandboxes per worker container.
# 3 containers × 2 runners = 6 total sandboxes on a 4-vCPU instance.
MAX_RUNNERS=3

# Resque idle polling interval (seconds). Default is 5s but spins CPU at 0.
# 0.1s: responsive without burning a full core on idle poll loops.
INTERVAL=0.1

# Harness forks 1 child per test case; needs at least TCs + overhead.
MAX_PROCESSES_PER_WORKER=1100

# Match the container's nofile ulimit set in docker-compose.ec2.yml.
OPEN_FILES_LIMIT=65536

# 512 KB: large enough for a 1000-TC harness with inline test data.
SOURCE_CODE_SIZE_LIMIT=524288

# Max memory_limit a client may request (KB).
# Set to 4194304 (4 GB) to match what judge0_client.py sends.
# On native Linux, isolate enforces the actual cgroup limit — physical usage
# stays at ~20 MB for typical Python problems regardless of this ceiling.
MAX_MEMORY_LIMIT=4194304
