# ── Config B override: workers=3, MAX_RUNNERS=3, 9 sandboxes ──────────────────
#
# Memory budget:
#   Fixed (OS+PG+Redis+Flask+Reconciler)  ~2.4 GB
#   Puma (WEB_CONCURRENCY=2 × THREADS=20) ~0.5 GB  →  40 HTTP slots
#   3 × workers (mem_limit=1.3g)           3.9 GB   (3 runners×30forks×12MB=1.08GB/container)
#   Total                                 ~6.8 GB / 7.6 GB  ✓
#
# Puma slots: 2×20=40  (9 sandboxes + 24 grading_worker = 33 needed → OK)
# DB max_connections: (2×20)+(3×5)+20 = 95 → 200 sufficient
#
# Apply:
#   docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.w3mr3.yml \
#     up -d --scale workers=3

services:
  server:
    environment:
      - RAILS_MAX_THREADS=20
      - WEB_CONCURRENCY=2
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY_BASE=${RAILS_SECRET_KEY_BASE}

  workers:
    mem_limit: 1.3g
    mem_reservation: 400m
    volumes:
      - ./judge0.ec2.mr3.conf:/judge0.conf:ro
