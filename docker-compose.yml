version: "3.9"

services:

  # ── cgroup v1 init ────────────────────────────────────────────────────────
  cgroupv1-init:
    image: alpine
    privileged: true
    network_mode: none
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: >-
      sh -c "
        echo 'cgroupv1-init: mounting cgroup v1 controllers...' &&
        for ctrl in memory cpuacct pids cpu; do
          dir=/sys/fs/cgroup/$$ctrl &&
          if mountpoint -q $$dir 2>/dev/null; then
            echo EXISTS: $$ctrl
          else
            mkdir -p $$dir &&
            (mount -t cgroup -o $$ctrl cgroup $$dir && echo MOUNTED: $$ctrl) ||
            echo SKIP: $$ctrl
          fi
        done &&
        echo 'cgroupv1-init: done' &&
        exit 0"
    restart: "no"

  # ── Judge0 API server (Puma / Rails) ─────────────────────────────────────
  server:
    image: judge0/judge0:1.13.0
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
    environment:
      # Total HTTP slots = WEB_CONCURRENCY × RAILS_MAX_THREADS = 8 × 25 = 200
      # Callback mode: 2 Puma calls per job → supports 100 concurrent grading jobs
      # Polling mode:  ~160 calls per job  → saturates at ~1 concurrent job
      - RAILS_MAX_THREADS=25
      - WEB_CONCURRENCY=8
      # Inject real secrets from .env — these override the CHANGE_ME placeholders
      # that are in the mounted judge0.conf.  Rails dotenv does not override
      # existing env vars, so container environment takes precedence.
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY_BASE=${RAILS_SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      cgroupv1-init:
        condition: service_completed_successfully

  # ── Judge0 Resque workers (isolate sandboxes) ─────────────────────────────
  # Phase 0 fix: mem_limit 4g→8g, MAX_RUNNERS=2→1 (see judge0.conf).
  # Each sandbox needs up to 3.5 GB (capped in judge0_client.py).
  # With MAX_RUNNERS=1: 1 sandbox × 3.5 GB = 3.5 GB, safely within 8 GB limit.
  # Scale with: docker compose up --scale workers=N
  #   Dev   (10 core / 16 GB):  --scale workers=6   (6 sandboxes)
  #   Prod  ( 8 core / 32 GB):  --scale workers=12  (12 sandboxes)
  #   Prod  (16 core / 64 GB):  --scale workers=24  (24 sandboxes)
  # Rule: replicas ≤ available CPU cores − 2
  workers:
    image: judge0/judge0:1.13.0
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    mem_limit: 8g
    mem_reservation: 4g
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
    environment:
      # Same secret overrides as the server service (see comment above).
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY_BASE=${RAILS_SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  # ── Flask grading API (gunicorn + gevent) ────────────────────────────────
  # Phase 0 fix: replaces `python api.py` (Werkzeug dev server).
  # gevent workers handle 1000 SSE streams with greenlets, not OS threads,
  # eliminating the 8 GB RAM spike from 1000 × 8 MB thread stacks.
  # timeout=1900 > SSE_TIMEOUT_S=1800 so gunicorn never cuts a live stream.
  api:
    build: .
    command:
      - gunicorn
      - api:app
      - --worker-class=gevent
      - --workers=2
      - --worker-connections=1000
      - --bind=0.0.0.0:5000
      - --timeout=1900
    ports:
      - "5001:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Sourced from .env; see api service comment for production secrets upgrade.
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JUDGE0_URL=http://server:2358
      - MAX_QUEUE_DEPTH=5000
      - SSE_TIMEOUT_S=1800
      - PORT=5000
      # Optional: protect /health with a bearer token (set HEALTH_TOKEN in .env).
      - HEALTH_TOKEN=${HEALTH_TOKEN:-}
    depends_on:
      - redis
      - server
    restart: always

  # ── Python grading workers (async, callback mode) ─────────────────────────
  # Scale with: docker compose up --scale grading_worker=N
  # Each process runs MAX_CONCURRENCY=48 concurrent grading coroutines.
  #
  # Callback mode (always active — polling has been removed):
  #   Judge0 POSTs the result back the instant a job finishes.
  #   Only 2 Puma HTTP calls per job (submit + webhook) vs. ~31 with polling.
  #   CALLBACK_PORT=0 → OS picks a free port per replica automatically.
  #   Each worker auto-detects its own container IP (via gethostbyname)
  #   and embeds it in the callback_url sent to Judge0.
  #   No host-port mapping needed — server→grading_worker is Docker-internal.
  grading_worker:
    build: .
    command: ["python", "worker_async.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JUDGE0_URL=http://server:2358
      - WORKER_CONCURRENCY=48
      - MAX_RETRY_COUNT=3
      - CALLBACK_PORT=0
    depends_on:
      - redis
      - server
    restart: always

  # ── Reconciler (crash recovery + deadline enforcement) ────────────────────
  # Single instance — it only reads/writes Redis, no state to shard.
  reconciler:
    build: .
    command: ["python", "reconciler.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Sourced from .env; see api service comment for production secrets upgrade.
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RECONCILER_SCAN_INTERVAL_S=60
    depends_on:
      - redis
    restart: always

  # ── PostgreSQL (Judge0 internal DB) ───────────────────────────────────────
  # max_connections formula: (WEB_CONCURRENCY×RAILS_MAX_THREADS) + (workers×5) + 20
  # At --scale workers=24: (8×25) + (24×5) + 20 = 340 → 500 gives safe headroom.
  db:
    image: postgres:13
    env_file: judge0.conf
    # POSTGRES_PASSWORD from .env overrides the CHANGE_ME placeholder in judge0.conf.
    # Docker Compose env_file is loaded first; environment: entries take precedence.
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: postgres -c max_connections=500 -c shared_buffers=512MB
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  # ── Redis (queue + results + pub/sub) ────────────────────────────────────
  # Phase 0 fix: maxmemory 512mb→4gb.
  # Memory budget at 1000-submission peak:
  #   Queued jobs: ~5 MB | Results: ~100 MB | Inflight/idem keys: ~10 MB
  #   Total: ~115 MB — 4 GB gives 35× headroom for large TC payloads.
  redis:
    image: redis:6.0
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory",        "4gb",
        "--maxmemory-policy", "allkeys-lru",
        # ${REDIS_PASSWORD} is substituted from the .env file by Docker Compose.
        "--requirepass",      "${REDIS_PASSWORD}"
      ]
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:

# ── Docker secrets (production hardening) ───────────────────────────────────
# To use Docker secrets instead of .env substitution for Python services:
#   1. Create secrets/redis_password, secrets/postgres_password, secrets/rails_secret_key
#      (see secrets/.gitignore for instructions)
#   2. Uncomment the block below.
#   3. In each Python service (api, grading_worker, reconciler), replace
#      REDIS_PASSWORD=${REDIS_PASSWORD} with REDIS_PASSWORD_FILE=/run/secrets/redis_password
#      and add `secrets: [redis_password]` to the service definition.
#      The _read_secret() helper in each Python service supports both forms.
#
# secrets:
#   redis_password:
#     file: ./secrets/redis_password
#   postgres_password:
#     file: ./secrets/postgres_password
#   rails_secret_key:
#     file: ./secrets/rails_secret_key
