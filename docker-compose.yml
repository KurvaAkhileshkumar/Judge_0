version: "3.9"

services:

  # ── cgroup v1 init ────────────────────────────────────────────────────────
  # Docker Desktop on Apple Silicon uses cgroup v2 by default.
  # isolate (Judge0's sandbox) requires cgroup v1 subsystem directories
  # (/sys/fs/cgroup/memory, /sys/fs/cgroup/cpuacct, etc.).
  # This init container attempts to mount them before workers start.
  # On cgroup-v1 or hybrid Linux hosts this fully fixes the issue.
  # On pure cgroup-v2 hosts (Docker Desktop Mac) it skips gracefully.
  cgroupv1-init:
    image: alpine
    privileged: true
    network_mode: none
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: >-
      sh -c "
        echo 'cgroupv1-init: mounting cgroup v1 controllers...' &&
        for ctrl in memory cpuacct pids cpu; do
          dir=/sys/fs/cgroup/$$ctrl &&
          if mountpoint -q $$dir 2>/dev/null; then
            echo EXISTS: $$ctrl
          else
            mkdir -p $$dir &&
            (mount -t cgroup -o $$ctrl cgroup $$dir && echo MOUNTED: $$ctrl) ||
            echo SKIP: $$ctrl
          fi
        done &&
        echo 'cgroupv1-init: done' &&
        exit 0"
    restart: "no"

  server:
    image: judge0/judge0:1.13.0
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    # F-07 fix: raise OS TCP listen backlog so connections 129-1000 are not
    # RST before Puma even sees them.  net.core.somaxconn is namespaced per
    # network namespace and safe in all Docker versions.  tcp_max_syn_backlog
    # requires privileged: true (already set above) on Linux kernels < 4.9;
    # it is a no-op on newer kernels where the namespace limit applies.
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
    environment:
      # RAILS_MAX_THREADS = threads per Puma process (holds one DB connection each)
      # WEB_CONCURRENCY   = number of Puma processes
      # Total HTTP connections = WEB_CONCURRENCY × RAILS_MAX_THREADS
      #
      # Dev   (10 core / 16 GB):  WEB_CONCURRENCY=4  × RAILS_MAX_THREADS=20 =  80 connections
      # Prod  ( 8 core / 32 GB):  WEB_CONCURRENCY=8  × RAILS_MAX_THREADS=25 = 200 connections  ← F-07
      # Prod  (16 core / 64 GB):  WEB_CONCURRENCY=8  × RAILS_MAX_THREADS=25 = 200 connections
      #
      # Rule: never exceed (postgres max_connections - worker_connections - 20 headroom)
      # Current: (8 × 25) + (workers × 5) + 20 = 235 → max_connections=300 in db service
      - RAILS_MAX_THREADS=25
      - WEB_CONCURRENCY=8
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      cgroupv1-init:
        condition: service_completed_successfully

  workers:
    image: judge0/judge0:1.13.0
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    # F-03 fix: raise per-container process and file-descriptor limits.
    # Default nproc (1024–4096) is exhausted when a harness forks 1,000
    # children — fork() fails mid-launch and the harness falls back to
    # 33-minute sequential mode.  65536 gives each container headroom for
    # 1,000 children × MAX_RUNNERS=2 sandboxes + OS overhead with room to spare.
    # nofile is raised to match (each pipe() consumes 2 fds; 1000 TCs = 2000 fds).
    # mem_limit scopes any OOM kill to this container — not the host.
    # mem_reservation is a soft hint for the scheduler.
    # With enable_per_process_and_thread_memory_limit=True the sandbox's
    # cgroup ceiling is set here; without it the host was vulnerable to OOM.
    mem_limit: 4g
    mem_reservation: 2g
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    # Scale workers with: docker compose up --scale workers=N
    #
    # Dev   (10 core / 16 GB):  --scale workers=3   (MAX_RUNNERS=2 → 6 sandboxes)
    # Prod  ( 8 core / 32 GB):  --scale workers=6   (MAX_RUNNERS=2 → 12 sandboxes)
    # Prod  (16 core / 64 GB):  --scale workers=12  (MAX_RUNNERS=2 → 24 sandboxes)
    #
    # Rule: replicas = available CPU cores − 2 (reserve for server + db)
    #       MAX_RUNNERS in judge0.conf should stay at 2 regardless of replica count

  db:
    image: postgres:13
    env_file: judge0.conf
    # max_connections must cover: (WEB_CONCURRENCY × RAILS_MAX_THREADS) + (workers × 5) + 20 headroom
    # F-07: (8 × 25) + (3 × 5) + 20 = 235  →  300 limit gives safe headroom
    # If worker replica count is raised above 3, recalculate: each worker holds ~5 connections.
    command: postgres -c max_connections=300
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  redis:
    image: redis:6.0
    command:
      [
        "redis-server",
        "--appendonly", "yes",           # AOF persistence — survives restarts
        "--maxmemory",        "512mb",   # hard cap — prevents Redis eating all RAM
        "--maxmemory-policy", "noeviction", # reject new jobs if full, never silently drop
        "--requirepass",      "judge0redis" # CHANGE THIS before production
      ]
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
