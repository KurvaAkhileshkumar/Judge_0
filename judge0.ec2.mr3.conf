# PostgreSQL
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_HOST=db
POSTGRES_PORT=5432

# Redis
REDIS_HOST=redis
REDIS_PORT=6379

# Judge0 / Rails
RAILS_ENV=production
RACK_ENV=production
JUDGE0_TELEMETRY_ENABLE=false

# ── Submission defaults ────────────────────────────────────────────────────
CPU_TIME_LIMIT=5
WALL_TIME_LIMIT=10
MEMORY_LIMIT=256000

# ── Queue ──────────────────────────────────────────────────────────────────
MAX_QUEUE_SIZE=200

# ── Worker sandbox settings ────────────────────────────────────────────────
# MAX_RUNNERS=3: 3 concurrent isolate sandboxes per worker container.
# Memory per container: 3 harnesses × 30 forks × ~12 MB = ~1.08 GB.
# Requires mem_limit >= 1.1g in docker-compose override.
# Configs using this file: B (w3mr3), D (w4mr3).
MAX_RUNNERS=3

# Resque idle polling interval (seconds).
INTERVAL=0.1

# Harness forks 1 child per test case in parallel.
# MAX_PARALLEL_TCS=200 + 20 overhead = 220 minimum.
MAX_PROCESSES_AND_OR_THREADS=220
MAX_MAX_PROCESSES_AND_OR_THREADS=500

# Match the container's nofile ulimit.
OPEN_FILES_LIMIT=65536

# 512 KB: large enough for a 1000-TC harness with inline test data.
SOURCE_CODE_SIZE_LIMIT=524288
