# EC2 c5.xlarge tuning — 4 vCPU / 7.6 GB RAM / Ubuntu 22.04.5 LTS / ap-south-1
#
# ══════════════════════════════════════════════════════════════════════════════
#  CONFIG A — BASELINE  (workers=3, MAX_RUNNERS=2, 6 sandboxes)
#  This is the base file.  For other configs apply an override file:
#
#    Config B (w3,mr3, 9 sandboxes):
#      docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.w3mr3.yml \
#        up -d --scale workers=3
#
#    Config C (w4,mr2, 8 sandboxes):
#      docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.w4mr2.yml \
#        up -d --scale workers=4
#
#    Config D (w4,mr3, 12 sandboxes) ⚠ borderline RAM:
#      docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.w4mr3.yml \
#        up -d --scale workers=4
#
#    Config E (w5,mr2, 10 sandboxes):
#      docker compose -f docker-compose.ec2.yml -f docker-compose.ec2.w5mr2.yml \
#        up -d --scale workers=5
# ══════════════════════════════════════════════════════════════════════════════
#
# Memory budget — Config A (workers=3, MAX_RUNNERS=2):
#   OS + overhead          ~1.0 GB  (fixed)
#   PostgreSQL             ≤0.4 GB  (mem_limit=400m, shared_buffers=128MB)
#   Redis                  ≤0.5 GB  (mem_limit=512m, maxmemory=512mb)
#   Flask API + reconciler ~0.4 GB  (fixed)
#   Judge0 server (Puma)   ~0.4 GB  (WEB_CONCURRENCY=2 × RAILS_MAX_THREADS=16 = 32 slots)
#   3 × workers            ≤3.0 GB  (mem_limit=1g; 2 runners × 30 forks × ~12MB = ~720MB/container)
#   Total                  ~5.7 GB  ← ~1.9 GB headroom on 7.6 GB
#
# Sandbox capacity:  workers=3 × MAX_RUNNERS=2 = 6 concurrent sandboxes
# Puma HTTP slots:   WEB_CONCURRENCY=2 × RAILS_MAX_THREADS=16 = 32 slots
#                    (6 sandboxes + 24 grading_worker threads = 30 needed → OK)
# DB max_connections: (2×16) + (3×5) + 20 = 87 → 200 is safe headroom
#
# Per-process memory model (30 TCs):
#   Each harness forks 1 child per TC → MAX_RUNNERS runners × 30 forks
#   Each Python child: ~12 MB RSS
#   MAX_RUNNERS=2: 2×30×12 = 720 MB per container → fits in 1g ✓
#   MAX_RUNNERS=3: 3×30×12 = 1.08 GB per container → needs 1.1-1.3g (see override files)

services:

  # ── Judge0 API server (Puma / Rails) ──────────────────────────────────────
  # 2 Puma processes × 16 threads = 32 HTTP slots
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.ec2.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    sysctls:
      net.core.somaxconn: 4096
      net.ipv4.tcp_max_syn_backlog: 4096
    environment:
      - RAILS_MAX_THREADS=16
      - WEB_CONCURRENCY=2
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY_BASE=${RAILS_SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  # ── Judge0 Resque workers (isolate sandboxes) ─────────────────────────────
  # Config A: --scale workers=3 → 3 containers × MAX_RUNNERS=2 = 6 sandboxes
  # mem_limit=1g: 2 runners × 30 forks × ~12MB = ~720MB + Rails/Resque overhead
  # Override mem_limit via docker-compose.ec2.w*.yml for other configs.
  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.ec2.conf:/judge0.conf:ro
    privileged: true
    restart: always
    mem_limit: 1g
    mem_reservation: 256m
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY_BASE=${RAILS_SECRET_KEY_BASE}
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  # ── Flask grading API (gunicorn + gevent) ─────────────────────────────────
  api:
    build: .
    command:
      - gunicorn
      - api:app
      - --worker-class=gevent
      - --workers=2
      - --worker-connections=500
      - --bind=0.0.0.0:5000
      - --timeout=1900
    ports:
      - "5001:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JUDGE0_URL=http://server:2358
      - MAX_QUEUE_DEPTH=5000
      - SSE_TIMEOUT_S=1800
      - PORT=5000
      - HEALTH_TOKEN=${HEALTH_TOKEN:-}
    depends_on:
      - redis
      - server
    restart: always

  # ── Python grading workers (async, callback mode) ─────────────────────────
  # WORKER_CONCURRENCY=24: I/O-bound (waits for Judge0 callbacks), safe on 4 vCPU
  grading_worker:
    build: .
    command: ["python", "worker_async.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JUDGE0_URL=http://server:2358
      - WORKER_CONCURRENCY=24
      - MAX_RETRY_COUNT=3
      - CALLBACK_PORT=0
    depends_on:
      - redis
      - server
    restart: always

  # ── Reconciler (crash recovery + deadline enforcement) ────────────────────
  reconciler:
    build: .
    command: ["python", "reconciler.py"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RECONCILER_SCAN_INTERVAL_S=60
    depends_on:
      - redis
    restart: always

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  # max_connections formula: (WEB_CONCURRENCY×RAILS_MAX_THREADS) + (workers×5) + 20
  # Config A: (2×16) + (3×5) + 20 = 87  → 200 safe headroom (all configs fit ≤125)
  # Config E: (3×16) + (5×5) + 20 = 113 → 200 still sufficient
  db:
    image: postgres:13
    env_file: judge0.ec2.conf
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=128MB
      -c effective_cache_size=1GB
      -c wal_buffers=16MB
      -c work_mem=4MB
      -c checkpoint_completion_target=0.9
    mem_limit: 400m
    mem_reservation: 128m
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  # ── Redis ──────────────────────────────────────────────────────────────────
  # 512 MB cap: results TTL 2h, peak ~500 results × 5KB = 2.5MB actual → 200× headroom
  #
  # Shell-form command so we can conditionally add --requirepass only when
  # REDIS_PASSWORD is non-empty.  Redis 6.0 treats --requirepass "" as no-auth
  # (sets USER_FLAG_NOPASS), but redis-rb 4.1.4 still sends AUTH "" for an empty
  # password (empty string is truthy in Ruby) → "ERR AUTH called without any
  # password configured".  The conditional avoids this mismatch.
  redis:
    image: redis:6.0
    command: >-
      sh -c "
        ARGS='--appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru';
        [ -n \"$$REDIS_PASSWORD\" ] && ARGS=\"$$ARGS --requirepass $$REDIS_PASSWORD\";
        exec redis-server $$ARGS
      "
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    mem_limit: 512m
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
