# PostgreSQL
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass
POSTGRES_HOST=db
POSTGRES_PORT=5432

# Redis
REDIS_PASSWORD=judge0redis
REDIS_HOST=redis
REDIS_PORT=6379

# Judge0
RAILS_ENV=production
RACK_ENV=production
SECRET_KEY_BASE=judge0secretkey1234567890abcdef1234567890abcdef
JUDGE0_TELEMETRY_ENABLE=false

# MAX_QUEUE_SIZE: how many submissions Redis will hold waiting for a worker.
# At ~2 KB per queued job, 10000 jobs = ~20 MB in Redis memory.
MAX_QUEUE_SIZE=10000

# MAX_RUNNERS: simultaneous isolate sandbox processes per worker replica.
# Phase 0 fix: changed from 2 → 1.
# Each sandbox needs up to 3.5 GB RAM (capped in judge0_client.py).
# With MAX_RUNNERS=2: 2 × 3.5 GB = 7 GB > the 4 GB mem_limit → Docker OOM.
# With MAX_RUNNERS=1: 1 × 3.5 GB = 3.5 GB, safely within 8 GB mem_limit.
# Scale throughput by adding more worker replicas, not more runners per replica.
# Total sandboxes = worker_replicas × MAX_RUNNERS.
# Rule: total sandboxes ≤ available CPU cores − 2.
#
# Dev   (10 core / 16 GB):  --scale workers=8   × MAX_RUNNERS=1 =  8 sandboxes  ✓
# Prod  ( 8 core / 32 GB):  --scale workers=12  × MAX_RUNNERS=1 = 12 sandboxes  ✓
# Prod  (16 core / 64 GB):  --scale workers=24  × MAX_RUNNERS=1 = 24 sandboxes  ✓
MAX_RUNNERS=1

# MAX_PROCESSES_PER_WORKER: max processes isolate allows inside one sandbox.
# Default is 64. A harness forking 1,000 children needs at least 1,001.
# At 64 the harness hits the limit instantly and falls back to sequential
# execution (33 minutes per submission). 1,100 = 1,000 children + overhead.
MAX_PROCESSES_PER_WORKER=1100

# OPEN_FILES_LIMIT: max open file descriptors inside one sandbox.
# Default is 0 (no restriction by Judge0 — inherits from the container).
# Explicit value avoids relying on the Docker ulimit inheritance chain.
# A harness forking 1,000 children needs 2 fds per child (pipe read/write)
# plus stdin/stdout/stderr + overhead = ~2,064 fds minimum.
# 65,536 matches the container's docker-compose.yml nofile limit.
OPEN_FILES_LIMIT=65536

# SOURCE_CODE_SIZE_LIMIT: max harness size in bytes Judge0 will accept.
# Default is 65,536 (64 KB). A 1,000-TC harness with inline test data
# easily exceeds this — Judge0 silently truncates it, producing a compile
# error or garbled output. 524,288 = 512 KB, enough for any realistic harness.
SOURCE_CODE_SIZE_LIMIT=524288

# MAX_MEMORY_LIMIT: maximum memory_limit value (in KB) a client may request.
# Default is 512000 (500 MB). On Mac Docker Desktop + Rosetta 2, os.fork()
# in the harness causes child processes to hit RLIMIT_AS because Rosetta 2's
# JIT cache needs gigabytes of virtual address space. Raising this to 4 GB
# lets clients send memory_limit=4194304 which gives Rosetta 2 enough room.
# Physical memory is still bounded by the Docker container mem_limit=8g.
MAX_MEMORY_LIMIT=4194304
